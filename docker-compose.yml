version: '3.8'

services:
  e8leech-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
    volumes:
      - cache_data:/app/cache
      - logs:/app/logs
    restart: unless-stopped

volumes:
  cache_data:
  logs:
