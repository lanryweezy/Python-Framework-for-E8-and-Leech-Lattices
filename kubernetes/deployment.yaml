apiVersion: apps/v1
kind: Deployment
metadata:
  name: e8leech-api
  namespace: e8leech
  labels:
    app: e8leech-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: e8leech-api
  template:
    metadata:
      labels:
        app: e8leech-api
    spec:
      containers:
      - name: e8leech-api
        image: e8leech/lattice-api:latest
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_ENV
          value: "production"
        - name: PYTHONPATH
          value: "/app"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        # livenessProbe:
        #   httpGet:
        #     path: /api/health
        #     port: 5000
        #   initialDelaySeconds: 30
        #   periodSeconds: 10
        # readinessProbe:
        #   httpGet:
        #     path: /api/health
        #     port: 5000
        #   initialDelaySeconds: 5
        #   periodSeconds: 5
        volumeMounts:
        - name: cache-storage
          mountPath: /app/cache
        - name: logs-storage
          mountPath: /app/logs
      volumes:
      - name: cache-storage
        persistentVolumeClaim:
          claimName: e8leech-cache-pvc
      - name: logs-storage
        persistentVolumeClaim:
          claimName: e8leech-logs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: e8leech-api-service
  namespace: e8leech
spec:
  selector:
    app: e8leech-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: e8leech-cache-pvc
  namespace: e8leech
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: e8leech-logs-pvc
  namespace: e8leech
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
